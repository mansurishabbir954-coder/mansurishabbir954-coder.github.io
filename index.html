<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed's Ultimate 150+ Game Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #080810;
            color: #ffffff;
            text-align: center;
            padding-bottom: 20px;
        }
        header {
            background: linear-gradient(135deg, #0f0f1a, #151525);
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            border-bottom: 3px solid #00ffcc;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .status-box {
            background: rgba(0, 255, 204, 0.06);
            margin: 15px auto;
            padding: 12px;
            max-width: 95%;
            border-radius: 10px;
            border: 1px solid #00ffcc;
        }
        .status-box h1 {
            font-size: 22px;
            color: #ffcc00;
            margin-bottom: 5px;
        }
        .status-box p {
            font-size: 14px;
            color: #dddddd;
        }
        .store-section {
            margin: 15px auto;
            padding: 5px;
            max-width: 98%;
        }
        /* NEW BLOCKPROOF ARCADE CONTAINER */
        .arcade-box {
            width: 100%;
            height: 80vh; /* Mobile screen par full fit aayega */
            background: #111;
            border: 3px solid #00ffcc;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
        }
        .arcade-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        footer {
            margin-top: 25px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

    <header>🎮 AHMED'S MEGA GAME EMPIRE</header>

    <div class="status-box">
        <h1>🔥 150+ Live Global Games</h1>
        <p>Niche click kijiye aur bina download kiye unlimited Action, Racing aur Cricket games khelo!</p>
    </div>

    <div class="store-section">
        <div class="arcade-box">
            <iframe src="https://play.gamepix.com/?token=FREE-GAMES&theme=dark" allowfullscreen="true" scrolling="yes"></iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Powered by Ahmed's Game Network.</p>
    </footer>

</body>
</html>
