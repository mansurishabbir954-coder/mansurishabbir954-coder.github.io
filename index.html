<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed's Ultimate 150+ Game Grid Store</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #06060c;
            color: #ffffff;
            padding-bottom: 30px;
        }
        header {
            background: linear-gradient(135deg, #0f0f1d, #141426);
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            border-bottom: 3px solid #00ffcc;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .intro-text {
            text-align: center;
            margin: 15px auto;
            font-size: 14px;
            color: #ffcc00;
            font-weight: bold;
        }
        /* GAME GRID DESIGN */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-gap: 12px;
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: #11111e;
            border: 2px solid #222235;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .game-card:active {
            transform: scale(0.95);
            border-color: #00ffcc;
        }
        .game-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }
        .game-title {
            font-size: 11px;
            padding: 6px 4px;
            color: #eeeeee;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 6px;
        }
        /* POPUP SCREEN FOR PLAYING GAME */
        .game-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
        }
        .popup-header {
            background: #111;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ffcc;
        }
        .popup-title {
            color: #00ffcc;
            font-weight: bold;
            font-size: 16px;
        }
        .close-btn {
            background: #ff3333;
            color: white;
            border: none;
            padding: 6px 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #loading {
            text-align: center;
            font-size: 18px;
            color: #00ffcc;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>🎮 AHMED'S 150+ GRID STORE</header>
    
    <div class="intro-text">🔥 Sabhi games ek sath! Kisi bhi game par click karke khelo:</div>

    <div id="loading">Games Load Ho Rahe Hain, Sabr Rakhein... ⏳</div>

    <div class="game-grid" id="gridDisplay"></div>

    <div class="game-popup" id="gamePopup">
        <div class="popup-header">
            <span class="popup-title" id="currentPlayingTitle">Loading Game...</span>
            <button class="close-btn" onclick="closeGame()">X BACK 🛑</button>
        </div>
        <div class="iframe-container">
            <iframe id="gamePlayer" src="" allowfullscreen="true"></iframe>
        </div>
    </div>

    <script>
        // GamePix ki official feed jisse 150+ top games auto-fetch honge
        const feedUrl = "https://feed.gamepix.com/v2/json?collection=featured&num=150";

        async function loadStoreGames() {
            try {
                const response = await fetch(feedUrl);
                const data = await response.json();
                
                if(data && data.data) {
                    document.getElementById('loading').style.display = 'none';
                    const grid = document.getElementById('gridDisplay');
                    
                    data.data.forEach(game => {
                        // Card Banana har ek game ke liye
                        const card = document.createElement('div');
                        card.classList.add('game-card');
                        // GamePix ka secured direct play link
                        const playUrl = `https://play.gamepix.com/${game.id}?token=FREE-GAMES&theme=dark`;
                        
                        card.onclick = function() {
                            openGame(playUrl, game.title);
                        };

                        card.innerHTML = `
                            <img src="${game.thumbnailUrl || 'https://via.placeholder.com/150'}" alt="${game.title}" loading="lazy">
                            <div class="game-title">${game.title}</div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (error) {
                document.getElementById('loading').innerText = "Oops! Network slow hai, page refresh kariye.";
                console.error(error);
            }
        }

        function openGame(url, title) {
            document.getElementById('currentPlayingTitle').innerText = title.toUpperCase();
            document.getElementById('gamePlayer').src = url;
            document.getElementById('gamePopup').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gamePopup').style.display = 'none';
            document.getElementById('gamePlayer').src = ''; // Game stop karne ke liye
        }

        // Page khulte hi games load honge
        window.onload = loadStoreGames;
    </script>
</body>
</html>
